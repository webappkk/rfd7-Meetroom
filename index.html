<!DOCTYPE html>
<html lang="th">
<head>

    <!-- Open Graph -->
    <meta property="og:type" content="website">

<!-- Favicon -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2316a34a' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><rect x='3' y='4' width='18' height='18' rx='2' ry='2'/><line x1='16' y1='2' x2='16' y2='6'/><line x1='8' y1='2' x2='8' y2='6'/><line x1='3' y1='10' x2='21' y2='10'/></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2316a34a' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><rect x='3' y='4' width='18' height='18' rx='2' ry='2'/><line x1='16' y1='2' x2='16' y2='6'/><line x1='8' y1='2' x2='8' y2='6'/><line x1='3' y1='10' x2='21' y2='10'/></svg>">
<meta name="theme-color" content="#16a34a">

    <style>
        /* ✅ รีเซ็ตทุก margin/padding และกำหนด height เต็มจอ */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; /* ป้องกัน scrollbar ซ้อน */
        }

        /* ✅ iframe เต็มจอสมบูรณ์ */
        #main-frame {
            position: fixed;  /* fixed ดีกว่า absolute — ไม่ขยับตาม scroll */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            background: #f3f4f6; /* สีพื้นหลังระหว่างรอโหลด */
        }
    </style>
</head>
<body>
    <!-- 💡 เพิ่ม allow และ sandbox เพื่อปลดล็อกสิทธิ์ให้ Google Apps Script ทำงานในกรอบได้อย่างสมบูรณ์ -->
    <iframe
        id="main-frame"
        allowfullscreen
        allow="clipboard-read; clipboard-write"
        sandbox="allow-top-navigation allow-top-navigation-by-user-activation allow-scripts allow-same-origin allow-forms allow-popups"
        loading="eager"
        title="ระบบ QR & Short URL"
    ></iframe>

    <script>
        // 💡 ดึงพารามิเตอร์จาก URL ของ GitHub (ถ้ามี) ไปต่อท้าย Google Apps Script
        // ช่วยให้ถ้ามีคนเข้าโดเมน Github พร้อม ?id=xxx ระบบจะส่งต่อไปได้ถูกต้อง
        const urlParams = window.location.search;
        const gasUrl = "https://script.google.com/macros/s/AKfycbzpSkv2IhclH2bRKJTxqHdbPgRuX4id0ht0ZB1eusgieZskHmM8LMRSbhbHkLN9qpk1pQ/exec" + urlParams;
        
        document.getElementById("main-frame").src = gasUrl;
    </script>
</body>
</html>
